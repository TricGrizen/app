<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>408</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:17px; }
  @media (min-width:2200px) { html { font-size:24px; } }
  @media (min-width:3200px) { html { font-size:33px; } }
  /* Surface 3:2 高分屏适配（守渡 2026-07）：WE 网页壁纸按物理分辨率渲染（Surface Pro 8=2880×1920，267PPI 下 24px 物理偏小）。
     两条仅在 3:2 高分屏 / ≤1600 窄视口触发；主力机 4K 3840×2160(16:9) 数学上恒不命中，回程零恢复。 */
  @media (min-width:2200px) and (max-aspect-ratio:8/5) { html { font-size:calc(32px * var(--fz,1)); } }
  @media (max-width:1600px) { html { font-size:calc(15px * var(--fz,1)); } }
  html,body { background:#000; color:#f5f5f7; height:100%;
    font-family:-apple-system,"SF Pro Display","SF Pro SC","PingFang SC","Segoe UI",
    "Microsoft YaHei UI",sans-serif;
    -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }
  #app { max-width:60rem; margin:0 auto; padding:3rem 2.5rem 9rem; min-height:100vh;
         display:flex; flex-direction:column; justify-content:center; }
  .dim { color:#86868b; } .small { font-size:.78rem; } .mono { font-variant-numeric:tabular-nums; }
  ::selection { background:#f5f5f7; color:#000; }

  /* top bar */
  .top { display:flex; align-items:center; gap:.7rem; margin-bottom:1.8rem; min-height:1.8rem; }
  .back { position:fixed; top:1rem; left:1rem; z-index:6;
          width:2.4rem; height:2.4rem; border-radius:50%;
          display:flex; align-items:center; justify-content:center;
          background:#1a1a1c; border:1px solid #2c2c2e;
          font-size:1.05rem; color:#86868b; cursor:pointer; user-select:none;
          opacity:.45; transition:opacity .2s, background .2s, transform .15s; }
  .back:hover { opacity:1; color:#f5f5f7; background:#242426; transform:scale(1.08); }
  .crumb { font-size:.78rem; color:#86868b; letter-spacing:.02em; }

  /* panels */
  .subj, .chp, .tray, .rival, .dq { background:#141416; border-radius:.5rem; border:none; }
  .subj { padding:1.1rem 1.3rem; margin-bottom:.7rem; cursor:pointer; transition:background .15s; }
  .subj.locked { cursor:default; color:#48484a; background:#0e0e10; }
  .subj:not(.locked):hover { background:#1f1f21; }
  .subj .row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.7rem; }
  .subj .nm { font-size:1rem; font-weight:600; }
  .bar { height:.32rem; border-radius:999px; position:relative; background:#2c2c2e; overflow:visible; }
  .bar > i { display:block; height:100%; border-radius:999px; background:#f5f5f7; transition:width .3s; }
  .bar > s { position:absolute; top:-.12rem; bottom:-.12rem; width:2px; border-radius:1px; background:#86868b; }

  .tray { padding:.9rem 1.2rem; margin:1.1rem 0; }
  .qchip { display:inline-block; background:#2c2c2e; border-radius:.35rem; padding:.25rem .8rem;
           margin:.25rem .35rem .1rem 0; font-size:.8rem; cursor:pointer; transition:background .15s; }
  .qchip:hover { background:#3a3a3c; }

  .rival { padding:1.1rem 1.2rem; margin:1.1rem 0; display:flex; gap:1rem; }
  .rv-av { flex:0 0 2.9rem; }
  .rv-av svg { width:2.9rem; height:2.9rem; }
  .rv-main { flex:1; min-width:0; }
  .rv-name { font-size:.92rem; font-weight:600; }
  .rv-line { margin-top:.6rem; font-size:.85rem; color:#aeaeb2; line-height:1.6; }
  .rv-strip { display:flex; gap:.18rem; margin-top:.6rem; }
  .rv-strip i { width:.62rem; height:.62rem; border-radius:.14rem; background:#1c1c1e; }
  .ghost { margin-top:.7rem; font-size:.75rem; color:#86868b; }
  .ghost .bar { margin-top:.3rem; }
  .tog { cursor:pointer; user-select:none; }
  .tog:hover { color:#f5f5f7; }

  .heat { margin:1.4rem 0 .5rem; }
  .heat-g { display:flex; gap:.18rem; }
  .heat-col { display:flex; flex-direction:column; gap:.18rem; }
  .heat i { width:.68rem; height:.68rem; border-radius:.15rem; background:#1c1c1e; display:block; }
  .legend { margin-top:.5rem; font-size:.75rem; color:#6e6e73; }

  .foot { margin-top:1.6rem; padding-top:1rem; border-top:1px solid #1c1c1e;
          font-size:.82rem; color:#86868b; }
  .foot span { margin-right:1.2rem; cursor:pointer; transition:color .15s; }
  .foot span:hover { color:#f5f5f7; }
  .locked-row { color:#48484a; font-size:.82rem; padding:.7rem 1.3rem 0; letter-spacing:.04em; }

  /* chapter list */
  .chp { padding:1rem 1.3rem; margin-bottom:.6rem; display:flex;
         justify-content:space-between; align-items:center; cursor:pointer; transition:background .15s; }
  .chp.locked { color:#48484a; background:#0e0e10; cursor:default; }
  .chp:not(.locked):hover { background:#1f1f21; }

  /* big single screens */
  .stage { display:flex; flex-direction:column; justify-content:center; min-height:46vh; }
  .sec-big { font-size:2.7rem; font-weight:600; line-height:1.25; letter-spacing:-.025em; }
  .sec-sub { margin-top:1rem; color:#6e6e73; font-size:.85rem; }
  .pt-bare { font-size:2.1rem; font-weight:600; line-height:1.35; letter-spacing:-.025em; }
  body.wide #app { max-width:108rem; }
  .pt-detail { margin-top:1.8rem; max-width:46rem; }
  .pt-detail .ln { font-size:1.06rem; line-height:1.8; color:#e2e2e6; padding:.7rem 0;
                   border-bottom:1px solid #1a1a1c; animation:fadein .45s ease both; }
  .pt-detail .ln:last-child { border-bottom:none; }
  @keyframes fadein { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:none;} }

  /* question */
  .qwrap { position:relative; padding-top:.3rem; }
  .qtag { font-size:.78rem; color:#86868b; letter-spacing:.06em; margin-bottom:1.1rem; }
  .qstem { font-size:1.05rem; line-height:1.85; white-space:pre-wrap; font-weight:500; }
  .qopts { margin-top:1.1rem; }
  .qopt { padding:.65rem .9rem; background:#141416; border-radius:.4rem; margin-bottom:.45rem;
          font-size:.95rem; line-height:1.7; white-space:pre-wrap; }
  .qopt.hit { background:#f5f5f7; color:#000; font-weight:600; }
  .qopt[data-opt] { cursor:pointer; transition:background .15s; }
  .qopt[data-opt]:hover { background:#222224; }
  .qopt.sel { box-shadow:inset 0 0 0 1px #6e6e73; }
  .qans { margin-top:1.2rem; animation:fadein .5s ease; }
  .qana { margin-top:.7rem; font-size:.92rem; line-height:1.9; color:#aeaeb2; white-space:pre-wrap; }
  .qfig { margin-top:.9rem; padding:.65rem .9rem; background:#0e0e10; border:1px dashed #2c2c2e;
          border-radius:.4rem; font-size:.88rem; line-height:1.7; color:#aeaeb2; white-space:pre-wrap; }
  .qpart { margin-top:.7rem; padding:.65rem .9rem; background:#141416; border-radius:.4rem;
           font-size:.95rem; line-height:1.7; white-space:pre-wrap; }
  .qpans { margin-top:.55rem; padding-top:.55rem; border-top:1px solid #2c2c2e; color:#aeaeb2;
           white-space:pre-wrap; animation:fadein .5s ease; }
  .bank-y { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem; }
  .bank-y span { padding:.45rem .8rem; background:#141416; border-radius:.4rem; cursor:pointer; font-size:.9rem; }
  .bank-y span.on { background:#f5f5f7; color:#000; font-weight:600; }
  .bq { padding:.55rem .2rem; border-bottom:1px solid #1c1c1e; cursor:pointer; font-size:.92rem; line-height:1.6; }
  .bq:hover { background:#141416; }
  .bq .tag { color:#86868b; font-size:.8rem; margin-right:.5rem; }
  html { scrollbar-width:none; -ms-overflow-style:none; }
  ::-webkit-scrollbar { width:0; height:0; display:none; }
  .quote { margin:1.2rem 0; padding:1rem 1.2rem; background:#141416; border-left:2px solid #6e6e73;
           border-radius:.4rem; cursor:pointer; }
  .quote:hover { background:#1a1a1c; }
  .q-text { font-size:.95rem; line-height:1.9; color:#d9d9de; white-space:pre-wrap; }
  .q-src { margin-top:.5rem; font-size:.78rem; color:#86868b; text-align:right; }
  .ghostbox { margin:.8rem 0; padding:.8rem 1.2rem; background:#141416; border-radius:.4rem;
              font-size:.85rem; color:#aeaeb2; }
  .dex-ch { margin:1.1rem 0 .5rem; font-size:.85rem; color:#86868b; letter-spacing:.05em; }
  #zenbtn { position:fixed; right:0; top:44%; width:14px; height:92px; background:#2c2c2e;
            border:1px solid #3a3a3c; border-right:none; border-radius:9px 0 0 9px;
            opacity:.22; transition:opacity .25s, width .2s; cursor:pointer; z-index:1004; }
  #zenbtn.near, #zenbtn:hover { opacity:.95; width:18px; }
  #zen { position:fixed; inset:0; background:#000; display:none; z-index:1002; cursor:pointer; }
  body.zenon #zen { display:block; }
  body.tint1 { filter:sepia(.15) brightness(.97); }
  body.tint2 { filter:sepia(.3) hue-rotate(-12deg) brightness(.93); }
  body.tint3 { filter:sepia(.28) hue-rotate(-30deg) saturate(1.55) brightness(.86); }
  #tintlab { position:fixed; right:16px; bottom:12px; z-index:1003; font-size:.78rem;
             color:#d4a657; display:none; letter-spacing:.05em; }
  body.tint2 #tintlab, body.tint3 #tintlab { display:block; }
  body.tint3 #tintlab { color:#ef6b6b; animation:tpulse 1.6s ease-in-out infinite; }
  @keyframes tpulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .star { position:absolute; top:0; right:0; font-size:1.3rem; cursor:pointer; color:#48484a;
          user-select:none; transition:color .15s; }
  .star.on { color:#f5f5f7; }

  /* card drop */
  .card { margin:0 auto; width:22rem; background:#0e0e10; border-radius:.6rem;
          padding:3rem 2rem; text-align:center; animation:fadein .6s ease;
          border:1px solid #3a3a3c; }
  .card.r2 { border-color:#5e8fb8; }
  .card.r3 { border-color:#9a7fd1; }
  .card.r4 { border:2px solid #d4a657; }
  .card.r5 { border:2px solid #d4577a; }
  .card .knm { font-size:1.35rem; font-weight:600; line-height:1.55; letter-spacing:-.01em; }

  /* dex */
  .dex-tabs { display:flex; gap:1rem; margin-bottom:1rem; font-size:.88rem; }
  .dex-tabs span { cursor:pointer; color:#6e6e73; padding:.25rem .8rem; border-radius:.35rem;
                   transition:all .15s; }
  .dex-tabs span.on { color:#000; background:#f5f5f7; font-weight:600; }
  .dex-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(8.4rem,1fr)); gap:.45rem; }
  .dex-c { background:#0e0e10; border-radius:.4rem; padding:.6rem .7rem; font-size:.76rem;
           min-height:3.2rem; border:1px solid #2c2c2e; display:flex; flex-direction:column;
           justify-content:center; gap:.4rem; }
  .dex-c.t2 { border-color:#5e8fb8; }
  .dex-c.t3 { border-color:#9a7fd1; }
  .dex-c.t4 { border-width:2px; border-color:#d4a657; }
  .dex-c.t5 { border-width:2px; border-color:#d4577a; }
  .dex-c.t6, .dex-show.t6, .card.r6 {
    border:2px solid transparent;
    background:
      linear-gradient(115deg, rgba(243,201,105,.20), rgba(255,143,177,.16), rgba(146,165,255,.20),
                      rgba(125,224,196,.15), rgba(243,201,105,.20)) padding-box,
      linear-gradient(#0f0f12,#0f0f12) padding-box,
      conic-gradient(from 40deg, #f3c969, #ff8fb1, #b89bff, #7de0c4, #f3c969) border-box;
    background-size:340% 340%, 100% 100%, 100% 100%;
    animation:legendFace 9s linear infinite, legend 2.8s ease-in-out infinite;
  }
  .dex-c.t6.own, .dex-show.t6.own { color:#f8e9c4; }
  @keyframes legendFace { from { background-position:0% 50%, 0 0, 0 0; }
                          to   { background-position:340% 50%, 0 0, 0 0; } }
  @keyframes legend { 0%,100% { box-shadow:0 0 9px rgba(243,201,105,.22); }
                      50%     { box-shadow:0 0 22px rgba(255,143,177,.5); } }
  .dex-c.own { color:#f5f5f7; }
  .dex-c[data-kp] { cursor:pointer; }
  .dex-c[data-kp]:hover { background:#161618; }
  .dex-c.miss { color:#3a3a3c; }
  .dex-c .qn { margin-left:.45rem; color:#6e6e73; font-size:.72rem; }
  .dex-qs { display:flex; flex-wrap:wrap; gap:.3rem; }
  .dexovl { position:fixed; inset:0; background:rgba(0,0,0,.74); backdrop-filter:blur(3px);
            display:flex; align-items:center; justify-content:center; z-index:900;
            cursor:pointer; animation:fadein .22s ease; }
  .dex-show { width:min(34rem,86vw); max-height:74vh; overflow-y:auto; cursor:default;
              border-radius:.7rem; padding:1.7rem 1.8rem; background:#101013;
              border:1px solid #2c2c2e; scrollbar-width:none; }
  .dex-show.t2 { border:2px solid #5e8fb8; }
  .dex-show.t3 { border:2px solid #9a7fd1; }
  .dex-show.t4 { border:2px solid #d4a657; }
  .dex-show.t5 { border:2px solid #d4577a; }
  .ds-title { font-size:1.18rem; font-weight:600; line-height:1.6; }
  .dex-show.miss .ds-title { color:#86868b; letter-spacing:.25em; }
  .ds-meta { margin-top:.55rem; font-size:.8rem; color:#86868b; }
  .ds-chips { margin-top:1.1rem; display:flex; flex-wrap:wrap; gap:.45rem; }

  /* doubts */
  .dq { padding:.85rem 1rem; margin-bottom:.55rem; cursor:pointer; font-size:.88rem;
        line-height:1.7; transition:background .15s; }
  .dq:hover { background:#1f1f21; }

  /* GO */
  #go { position:fixed; left:50%; transform:translateX(-50%); bottom:2.4rem;
        background:#f5f5f7; color:#000; border:none; border-radius:.5rem;
        font-size:1rem; font-weight:600; letter-spacing:.4em; text-indent:.4em;
        padding:.85rem 0; width:12rem; text-align:center; cursor:pointer; user-select:none;
        z-index:5; transition:all .15s; }
  #go:hover { background:#d1d1d6; transform:translateX(-50%) scale(1.02); }
  #go:active { transform:translateX(-50%) scale(.97); }
  #go.hide { display:none; }
  #undo { position:fixed; left:calc(50% - 10rem); bottom:2.4rem; width:2.55rem; height:2.55rem;
          display:flex; align-items:center; justify-content:center; background:#1c1c1e;
          color:#86868b; border-radius:.5rem; cursor:pointer; user-select:none; z-index:5;
          opacity:0; transition:all .2s; }
  #undo:hover { opacity:1; background:#2c2c2e; color:#f5f5f7; }
  #undo.hide { display:none; }

  /* overlay (export/import) */
  #ovl { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(18px);
         z-index:9; display:none; align-items:center; justify-content:center; }
  #ovl .box { width:min(40rem,92vw); background:#1c1c1e; border-radius:.6rem; padding:1.4rem; }
  #ovl textarea { width:100%; height:15rem; background:#0e0e10; color:#d1d1d6; border:none;
                  border-radius:.35rem; padding:.8rem; font-size:.75rem;
                  font-family:"SF Mono",Consolas,monospace; outline:none; }
  #ovl .ops { margin-top:.8rem; font-size:.82rem; color:#86868b; }
  #ovl .ops span { margin-right:1rem; cursor:pointer; }
  #ovl .ops span:hover { color:#f5f5f7; }

  #st { position:fixed; top:0; left:0; right:0; background:#1c1c1e; color:#f5f5f7;
        font-size:.72rem; padding:.4rem .8rem; display:none; z-index:20; }

  /* 执灯留言板（左上角，仅主页显示；zen 黑幕下隐藏） */
  #coach { position:fixed; top:1.15rem; left:1.45rem; z-index:5; max-width:29rem;
           opacity:0; pointer-events:none; transition:opacity .9s ease; }
  #coach.show { opacity:1; pointer-events:auto; }
  body.zenon #coach { opacity:0 !important; pointer-events:none !important; }
  #coach .c-tag { font-size:.58rem; letter-spacing:.22em; color:#48484a; margin-bottom:.4rem; user-select:none; }
  #coach .c-text { font-size:.83rem; line-height:1.78; color:#a1a1a6; white-space:pre-wrap; }
  #coach .c-text.fresh { animation:coachIn 1.4s ease; }
  #coach .c-time { font-size:.58rem; color:#3a3a3c; margin-top:.42rem; font-variant-numeric:tabular-nums; }
  @keyframes coachIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
  /* 余白不足的视口下：#app 让位 + 留言板钳宽带地板，防压科目卡（须位于基础规则之后才赢级联；主力机 4K 16:9 两条恒不触发） */
  @media (min-width:2200px) and (max-aspect-ratio:8/5) {
    #app { max-width:min(60rem, calc(100vw - 28rem)); }
    #coach { max-width:max(13rem, min(29rem, calc((100vw - 62rem)/2))); } }
  @media (max-width:1600px) {
    #app { max-width:min(60rem, calc(100vw - 28rem)); }
    #coach { max-width:max(13rem, min(29rem, calc((100vw - 62rem)/2))); } }

  /* 左下角一键清场（鼠标靠近左下角点亮；两段点击防误触；zen 黑幕下隐藏） */
  #panicbtn { position:fixed; left:0; bottom:7%; width:13px; height:84px; z-index:6;
              background:#2c2c2e; border-radius:0 7px 7px 0; cursor:pointer;
              opacity:.14; transition:opacity .25s, width .2s, background .3s; }
  #panicbtn.near, #panicbtn:hover { opacity:.85; width:17px; }
  #panicbtn.armed { background:#5a1b1b; opacity:.96; width:17px; }
  #paniclab { position:fixed; left:26px; bottom:7%; z-index:6; max-width:20rem;
              font-size:.72rem; line-height:1.5; color:#86868b; white-space:nowrap;
              opacity:0; pointer-events:none; transition:opacity .3s; }
  #paniclab.show { opacity:1; } #paniclab.warn { color:#d98b8b; }
  /* 左下角执灯总闸（Claude 介入统一开关）：默认熄=零外呼；常驻微光示状态，离返回键(屏幕中下)极远 */
  #gatebtn { position:fixed; left:10px; bottom:12px; z-index:6; display:flex; align-items:center;
             gap:7px; padding:5px 10px 5px 8px; border-radius:8px; cursor:pointer; user-select:none;
             font-size:.7rem; letter-spacing:.1em; color:#6e6e73; opacity:.3;
             transition:opacity .3s, background .3s, color .3s; }
  #gatebtn:hover { opacity:.92; background:#161617; }
  #gatebtn .dot { width:7px; height:7px; border-radius:50%; background:#3a3a3c;
                  transition:background .5s, box-shadow .5s; }
  #gatebtn.on { color:#b8b8bd; opacity:.5; }
  #gatebtn.on .dot { background:#e8e3d5; box-shadow:0 0 9px 2px rgba(232,227,213,.28); }
  #gatebtn.dead { color:#4a4a4e; }
  body.zenon #panicbtn, body.zenon #paniclab, body.zenon #gatebtn, body.zenon #ubtn, body.zenon #mbtn, body.zenon #fzctl { display:none; }
  /* 右下角字号旋钮（--fz 乘在自适应基准上）：仅 Surface 两种视口显示，主力机 4K 恒不可见；本机 localStorage，不入存档不迁移 */
  #fzctl { position:fixed; right:14px; bottom:12px; z-index:6; display:none; align-items:center; gap:.55rem;
           font-size:.66rem; letter-spacing:.08em; color:#6e6e73; opacity:.28; user-select:none;
           font-variant-numeric:tabular-nums; transition:opacity .3s; }
  #fzctl:hover { opacity:.9; }
  #fzctl span { cursor:pointer; padding:2px 4px; }
  #fzctl span:hover { color:#c7c7cc; }
  @media (min-width:2200px) and (max-aspect-ratio:8/5) { #fzctl { display:flex; } }
  @media (max-width:1600px) { #fzctl { display:flex; } }
  /* 右上角「语法宇宙」入口（英语一）：克制灰阶，悬停透出一点宇宙微光——动画含蓄而有生命感 */
  #ubtn { position:fixed; top:13px; right:16px; z-index:6; display:flex; align-items:center; gap:.45rem;
          text-decoration:none; font-size:.7rem; letter-spacing:.26em; text-transform:uppercase;
          color:#6e6e73; opacity:.5; transition:opacity .35s, color .35s; user-select:none; }
  #ubtn:hover { opacity:1; color:#c7c7cc; }
  #ubtn .orb { width:7px; height:7px; border-radius:50%;
               background:radial-gradient(circle at 32% 30%, #d6b8ff, #5b6bff 55%, #160e2e);
               box-shadow:0 0 7px 1px rgba(124,107,255,.45); animation:uorb 7s ease-in-out infinite; }
  @keyframes uorb { 0%,100% { box-shadow:0 0 6px 1px rgba(124,107,255,.4); }
                    50% { box-shadow:0 0 11px 2px rgba(70,217,138,.42); } }
  /* 右上角「数学宇宙」入口（数一）：与 #ubtn 同族，orb 换暖金——数学宇宙的一点金（章亥 2026-07） */
  #mbtn { position:fixed; top:36px; right:16px; z-index:6; display:flex; align-items:center; gap:.45rem;
          text-decoration:none; font-size:.7rem; letter-spacing:.26em; text-transform:uppercase;

<script>
"use strict";
/* ============================== data loading ============================== */
let DATA = null;          // {levels, questions, quotes}
let KP = {};              // id -> {id,title,detail,secId,subId}
let SEC = {};             // id -> section
let QS = {};              // id -> question
let HITS = {};            // kpId -> #questions hitting it
let CH_PTS = {};          // chId -> [pointIds]
let CH_QN = {};           // chId -> #distinct questions hitting the chapter
let GATE = {};            // qId -> 门槛点（该题考点中大纲序最靠后者，唯一浮现点）
let TOTAL_KP = 0;

async function loadData() {
  const tryFetch = async (f) => {
    const r = await fetch(f, {cache: "no-store"});
    if (!r.ok) throw new Error(f);
    return r.json();
  };
  try {
    const [levels, questions, quotes] = await Promise.all(
      ["levels.json", "questions.json", "quotes.json"].map(tryFetch));
    DATA = {levels, questions, quotes};
  } catch (e) {
    if (window.__DATA) DATA = window.__DATA;
    else { document.getElementById("app").textContent = "数据加载失败：缺少 data.js 或 json 文件"; throw e; }
  }
  indexData();
}
function indexData() {
  let ord = 0;
  for (const s of DATA.levels.subjects)
    for (const c of s.chapters) {
      CH_PTS[c.id] = [];
      for (const sec of (c.sections || [])) {
        SEC[sec.id] = sec; sec.subId = s.id; sec.chId = c.id;
        for (const p of sec.points) {
          KP[p.id] = p; p.secId = sec.id; p.subId = s.id; p.chId = c.id; p.ord = ord++;
          CH_PTS[c.id].push(p.id); TOTAL_KP++;
        }
      }
    }
  for (const q of DATA.questions) {
    QS[q.id] = q;
    const chs = new Set();
    let g = null, gord = -1;
    for (const k of q.kps) {
      HITS[k] = (HITS[k] || 0) + 1;
      if (KP[k]) { chs.add(KP[k].chId); if (KP[k].ord > gord) { gord = KP[k].ord; g = k; } }
    }
    GATE[q.id] = g;                              // 门槛点 = 大纲序最靠后的考点
    for (const ch of chs) CH_QN[ch] = (CH_QN[ch] || 0) + 1;
  }
}
/* tier: curated per-KP exam value (frequency × importance × difficulty), set in levels.json */
function tier(kp) { return (KP[kp] && KP[kp].tier) || 1; }

/* ============================== state ============================== */
const SKEY = "ky408_v1";
const RESET_TOKEN = "rt-20260614b";   // 改动此串并重新build＝让所有客户端（含WE）下次加载时清档一次
let S = null;
let SIM = false;           // selftest simulation: skip persistence side-effects
let WIPED = false;         // 本次加载发生过主动清档（?reset=1 / RESET_TOKEN 真换代）：空档获准照常按时间戳推平远端
function today() {   // 钉死北京时间 UTC+8，与服务端一致，跟机器本地时区无关
  const b = new Date(Date.now() + 8*3600*1000);
  return b.getUTCFullYear() + "-" + String(b.getUTCMonth()+1).padStart(2,"0") + "-" + String(b.getUTCDate()).padStart(2,"0");
}
function dkey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" +
         String(d.getDate()).padStart(2,"0");
}
function addDays(ds, n) { const d = new Date(ds + "T12:00:00"); d.setDate(d.getDate()+n); return dkey(d); }
function freshState() {
  return { v:1, t:0, firstDay: today(), done:{}, seen:{}, tray:[], trayT:{}, pendingQ:[], starred:[], wrongs:[],
           heat:{}, cur:null, ghost:false, quoteOff:0, time:{subj:{}, ch:{}}, exam:{} };
}
function virgin(st) {      // 处女档=无任何学习痕迹（新机/新浏览器刚出生的空状态；t 不作数——loadState 尾部的 save() 会给空档盖新时间戳）
  return !st || (!Object.keys(st.done || {}).length && !Object.keys(st.seen || {}).length &&
         !Object.keys(st.heat || {}).length && !Object.keys((st.time && st.time.subj) || {}).length);
}
function save() {
  if (SIM) return;
  S.t = Date.now();
  try { localStorage.setItem(SKEY, JSON.stringify(S)); } catch(e){}
  fileFlush(); syncFlush();
}
function loadState() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (raw) { S = JSON.parse(raw); if (S.v !== 1) S = freshState(); }
    else S = freshState();
  } catch(e) { S = freshState(); }
  if (S.cur && S.cur.ph === "pt") S.cur.ph = "bare";
  if (!S.wrongs) S.wrongs = [];
  if (!S.time) S.time = {subj: {}, ch: {}};
  if (!S.exam) S.exam = {};                     // 英一真题作答切片（象胥）：旧档迁移，铁律6
  // 托盘/跨会话队列机制已废止（改「门槛点全出」）：题永远只在它的门槛点出现，绝不漂到别处或前面。
  // 旧档残留与上会话没做完的待处理一律清空——这些题会在你下次经过其门槛点时整组重现，全集永远在真题库。
  S.tray = []; S.trayT = {}; S.pendingQ = [];
  save();
}
function heatAdd(kind) {
  const t = today();
  if (!S.heat[t]) S.heat[t] = {k:0, q:0};
  S.heat[t][kind]++;
}
function myTotal() { return Object.keys(S.done).length; }
function kpDayCount(ds) { return (S.heat[ds] && S.heat[ds].k) || 0; }

/* ---------- documents auto-sync（本地小服务 127.0.0.1:8418 → 我的文档\ky408存档） ---------- */
const SYNC_URL = "http://127.0.0.1:8418";
let SYNC_ON = false, SYNC_TIMER = null;
function syncFlush() {
  if (!SYNC_ON || SIM || ST_MODE) return;
  if (virgin(S) && !WIPED) return;   // 空档除非主动清档，永不出站——2026-07-01 迁移日事故：新机空 localStorage 的 t=now 曾赢过真档并覆写之
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER = setTimeout(() => {
    fetch(SYNC_URL + "/save", {method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify(S)}).catch(() => { SYNC_ON = false; });
  }, 1500);
}
async function syncInit() {
  if (ST_MODE) return;                   // selftest 页对存档服务零读零写
  try {
    const opt = AbortSignal && AbortSignal.timeout ? {signal: AbortSignal.timeout(1500)} : {};
    const r = await fetch(SYNC_URL + "/ping", opt);
    if (!r.ok) return;
    SYNC_ON = true;
    const remote = await (await fetch(SYNC_URL + "/load", opt)).json();
    let useRemote = false;
    if (remote && remote.v === 1) {
      if (!WIPED && virgin(S) && !virgin(remote)) useRemote = true;   // 新机/空浏览器首启：有内容的真档必胜刚出生的空档（t 谁新都一样）
      else if (!virgin(S) && virgin(remote)) useRemote = false;       // 远端是被污染的空档而本地有真数据：本地胜，推上去修复
      else useRemote = (remote.t || 0) > (S.t || 0);                  // 常规：新者胜
    }
    if (useRemote) {
      S = remote; try { localStorage.setItem(SKEY, JSON.stringify(S)); } catch (e) {}
    } else {
      syncFlush();                       // 本地胜：推上去（syncFlush 自身拒推未清档的空档）
    }
  } catch (e) {}
}

function logEv(e, d) {

}
function evFlush(beacon) {
  if (EV_OFF) return;
  if (!SYNC_ON) {                      // 服务未起：暂存本地，重连后补传
    if (!EVQ.length) return;
    try {

      localStorage.setItem("ky408_evq", JSON.stringify(old.concat(EVQ).slice(-4000)));
    } catch (e) {}

    pre = JSON.parse(localStorage.getItem("ky408_evq") || "[]");
    if (pre.length) localStorage.removeItem("ky408_evq");
  } catch (e) {}
  const evs = pre.concat(EVQ); EVQ = [];
  if (!evs.length) return;
  const body = JSON.stringify({sid: EV_SID, evs: evs});
  try {
    if (beacon && navigator.sendBeacon)

    else

}

/* ---------- save-file binding（进度直存到磁盘文件，File System Access API） ---------- */
let FH = null, FH_OK = false, FH_TIMER = null;
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("ky408fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("kv");
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function idbSet(k, v) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(v, k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(k) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("kv", "readonly");
    const rq = tx.objectStore("kv").get(k);
    rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error);
  });
}
async function bindSaveFile() {
  if (!window.showSaveFilePicker) return;
  try {
    FH = await showSaveFilePicker({suggestedName: "progress.json",
      types: [{description: "JSON", accept: {"application/json": [".json"]}}]});

    FH_OK = true; fileFlush(); renderHome();
  } catch (e) {}
}
async function reconnectFile() {
  if (!FH) return;
  try {
    let p = await FH.queryPermission({mode: "readwrite"});
    if (p !== "granted") p = await FH.requestPermission({mode: "readwrite"});
    FH_OK = (p === "granted");
    if (FH_OK) fileFlush();
  } catch (e) { FH_OK = false; }
  renderHome();
}
async function fileWriteNow() {
  if (!FH || !FH_OK) return;
  try { const w = await FH.createWritable(); await w.write(JSON.stringify(S, null, 1)); await w.close(); }
  catch (e) { FH_OK = false; }
}
function fileFlush() {
  if (!FH || !FH_OK) return;
  clearTimeout(FH_TIMER);
  FH_TIMER = setTimeout(fileWriteNow, 1200);
}

/* ============================== audio ============================== */
let AC = null;
function ac() { if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } return AC; }
function env(g, t0, a, d, peak) {
  g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(peak, t0+a);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+a+d);
}
function sndNext() {            /* next-screen blip */
  const c = ac(); if (!c) return; const t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type = "sine"; o.frequency.setValueAtTime(880, t); o.frequency.exponentialRampToValueAtTime(1320, t+0.05);
  env(g, t, 0.005, 0.07, 0.10); o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.09);
}
function sndSurface() {         /* question surfaces: low sting */
  const c = ac(); if (!c) return; const t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type = "square"; o.frequency.setValueAtTime(220, t); o.frequency.exponentialRampToValueAtTime(98, t+0.20);
  env(g, t, 0.004, 0.24, 0.09); o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.26);
  const o2 = c.createOscillator(), g2 = c.createGain();
  o2.type = "sine"; o2.frequency.setValueAtTime(440, t+0.02); o2.frequency.exponentialRampToValueAtTime(180, t+0.18);
  env(g2, t+0.02, 0.004, 0.18, 0.05); o2.connect(g2).connect(c.destination); o2.start(t+0.02); o2.stop(t+0.24);
}
function sndCard() {            /* card drop: triangle arpeggio */
  const c = ac(); if (!c) return; const t = c.currentTime;
  [523.25, 659.25, 783.99].forEach((f, i) => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = "triangle"; o.frequency.value = f;
    env(g, t + i*0.07, 0.006, 0.16, 0.09);
    o.connect(g).connect(c.destination); o.start(t + i*0.07); o.stop(t + i*0.07 + 0.2);
  });
}

/* ============================== quotes (经典名言) ============================== */
/* 按进度选名言：优先当前在读科目"前方1~2章"的内容，勾起对后面章节的兴趣 */
function chProgressNo() {
  const m = {};
  for (const s of DATA.levels.subjects) {
    m[s.id] = 0;
    for (const c of s.chapters)
      for (const sec of (c.sections || []))
        if (sec.points.some(p => S.done[p.id])) { m[s.id] = Math.max(m[s.id], c.no); break; }
  }
  return m;
}
function pickQuote() {
  const qs = DATA.quotes || [];
  if (!qs.length) return null;
  const cur = chProgressNo();
  const subj = S.cur ? S.cur.sub : null;
  const hereCh = subj && chById(S.cur.ch) ? chById(S.cur.ch).c.no : 0;
  // 优先级：正在学的章 → 同科目马上要学的1~2章 → 任意科目已学过的章 → 全部
  let pool = [];
  if (subj) pool = qs.filter(q => q.subject === subj && q.ch === hereCh);
  if (!pool.length && subj) pool = qs.filter(q => q.subject === subj && q.ch > hereCh && q.ch <= hereCh + 2);
  if (!pool.length) pool = qs.filter(q => (cur[q.subject] || 0) >= q.ch);
  if (!pool.length) pool = qs;
  let h = 0;
  const t = today();
  for (let i = 0; i < t.length; i++) h = (h * 31 + t.charCodeAt(i)) >>> 0;
  return pool[(h + (S.quoteOff || 0)) % pool.length];
}
function rolling7() { let s = 0; for (let i = 0; i < 7; i++) s += kpDayCount(addDays(today(), -i)); return s; }

/* ============================== surfacing engine ============================== */
/* queue items: {t:'card', kp} | {t:'qbare', q} | {t:'qans', q} */
let QUEUE = [];
function chComplete(chId) { return (CH_PTS[chId] || []).every(id => S.done[id]); }
// 浮现引擎：每道题归属唯一「门槛点」GATE = 它在大纲顺序里最靠后的考点（学完它，该题全部考点恰好备齐）。
// 题只在该门槛点出现，绝不在它命中的其它（更早的）点出现；初学到该点=首现、日后复习重经该点=再现，二者同一处；
// 同一门槛点下的题一次全出（无 ≤2 上限、无托盘）。大题与单选同规则（自身考点全 done 即可，不再要求整章）。
function ptQuestions(kp) {
  return DATA.questions
    .filter(q => GATE[q.id] === kp.id && q.kps.every(k => S.done[k]))
    .sort((a, b) => a.year - b.year || a.no - b.no);   // old first, newest last (the climax)
}
function surfaceAt(kp, review) {
  const qs = ptQuestions(kp);
  // 题只在自己的门槛点出现：经过此点时，待呈现队列就「是」这一组（替换任何残留，绝不漂到别的点或前面）。
  // 没做完就离开 → 这组随队列丢弃，下次再经过此点会原样整组重现；全集永远在真题库。
  QUEUE = qs.map(q => ({t: "qbare", q: q.id}));
  S.pendingQ = qs.map(q => q.id);
  logEv(review ? "re" : "kp", {id: kp.id, pop: S.pendingQ.slice(), tray: 0});
  if (qs.length) sndSurface();
}
function completePoint(kp) {
  const first = !S.done[kp.id];
  if (first) { S.done[kp.id] = today(); heatAdd("k"); }
  surfaceAt(kp, !first);                                // 首次学完=首现；重经已 done 的点=复习再现（同一门槛点）
  if (first && chComplete(kp.chId)) logEv("chdone", {ch: kp.chId});
  save();
}

function subjProgress(s) {
  // pct 按真题密度加权：完成了多少"题量权重"，而非数过多少结构节点
  let tot = 0, done = 0, tw = 0, dw = 0;
  for (const c of s.chapters) for (const sec of (c.sections||[])) for (const p of sec.points) {

    if (S.done[p.id]) { done++; dw += w; }

function bestDay() {
  let b = 0;
  for (const d in S.heat) b = Math.max(b, S.heat[d].k || 0);
  return b;
}
function ghostBars() {
  if (!S.ghost) return "";
  const bd = bestDay(), cur = kpDayCount(today());
  const mx = Math.max(bd, cur, 1);
  return `<div style="margin-top:.4rem">今日 ${cur}<div class="bar" style="margin-top:.25rem"><i style="width:${Math.round(cur/mx*100)}%"></i></div>
  最佳一天 ${bd}<div class="bar" style="margin-top:.25rem"><i style="width:${Math.round(bd/mx*100)}%;background:#6e6e73"></i></div></div>`;
}
function renderHeat() {
  const t = today();
  const weeks = 20;
  const qByDay = {};                           // 真题"题"数=按解锁日期(seen=点过GO或选项)现算，反复看不重计，与 done 解耦
  for (const id in (S.seen || {})) { const d = S.seen[id]; if (typeof d === "string" && d.length === 10) qByDay[d] = (qByDay[d] || 0) + 1; }
  // align: column per week, Mon..Sun rows
  const tEnd = new Date(t + "T12:00:00");
  const wdEnd = (tEnd.getDay() + 6) % 7;       // Mon=0
  let h = `<div class="heat"><div class="heat-g">`;
  for (let w = weeks - 1; w >= 0; w--) {
    h += `<div class="heat-col">`;
    for (let r = 0; r < 7; r++) {
      const off = w * 7 + (wdEnd - r);
      const ds = addDays(t, -off);
      if (ds > t) { h += `<i style="visibility:hidden"></i>`; continue; }
      const e = S.heat[ds] || {k:0,q:0};
      const qd = qByDay[ds] || 0;
      const n = e.k + qd;
      const c = n === 0 ? "#1c1c1e" : n <= 2 ? "#3a3a3c" : n <= 5 ? "#6e6e73" : n <= 9 ? "#aeaeb2" : "#f5f5f7";
      h += `<i style="background:${c}" title="${ds}：知识点 ${e.k} · 真题 ${qd}"></i>`;
    }
    h += `</div>`;
  }
  h += `</div></div>`;
  return h;
}

/* ---------- linear flow ---------- */
function chById(chId) {
  for (const s of DATA.levels.subjects) for (const c of s.chapters) if (c.id === chId) return {s, c};
  return null;
}
function startChapter(chId) {
  const {s, c} = chById(chId);
  // resume: if cursor already in this chapter, keep it; else start at first unfinished point
  if (!(S.cur && S.cur.ch === chId)) {
    let si = 0, pi = 0, found = false;
    outer:
    for (si = 0; si < c.sections.length; si++) {
      const pts = c.sections[si].points;
      for (pi = 0; pi < pts.length; pi++) {
        if (!S.done[pts[pi].id]) { found = true; break outer; }
      }
    }
    if (!found) { si = 0; pi = 0; }              // chapter fully done → review from top
    S.cur = {sub: s.id, ch: chId, sec: si, pt: pi, ph: "sec"};
    save();
  }
  VIEW = {scr: "flow"};
  renderFlow();
}
function curCh() { return chById(S.cur.ch).c; }
function renderFlow() {
  const c = curCh();
  const sec = c.sections[S.cur.sec];
  goBtn(true, true);
  if (S.cur.ph === "sec") {
    $app.innerHTML = topBar("", "chapters") +
      `<div class="stage"><div class="sec-big">${esc(sec.title)}</div>
       <div class="sec-sub">${sec.points.length}</div></div>`;
  } else if (S.cur.ph === "bare") {
    const p = sec.points[S.cur.pt];
    $app.innerHTML = topBar("", "chapters") +
      `<div class="stage"><div class="card r${tier(p.id)}">
         <div class="knm">${esc(p.title)}</div>
       </div></div>`;
  } else {
    const p = sec.points[S.cur.pt];
    $app.innerHTML = topBar("", "chapters") +
      `<div class="stage"><div class="pt-bare">${esc(p.title)}</div>
       <div class="pt-detail">${detailHtml(p.detail)}</div></div>`;
  }
}
function flowBack() {
  if (!S.cur) return;
  const c = curCh();
  if (S.cur.ph === "detail") S.cur.ph = "bare";
  else if (S.cur.ph === "bare") {
    if (S.cur.pt > 0) { S.cur.pt--; S.cur.ph = "detail"; }
    else S.cur.ph = "sec";
  } else if (S.cur.ph === "sec") {
    if (S.cur.sec > 0) {
      S.cur.sec--; S.cur.pt = c.sections[S.cur.sec].points.length - 1; S.cur.ph = "detail";
    }
  } else if (S.cur.ph === "done") {
    S.cur.sec = c.sections.length - 1;
    S.cur.pt = c.sections[S.cur.sec].points.length - 1; S.cur.ph = "detail";
  }
  save(); VIEW = {scr:"flow"}; renderFlow();
}
function curChCrumb(c) {
  const s = DATA.levels.subjects.find(x => x.id === S.cur.sub);
  return `${s.name} · 第${c.no}章`;
}
/* advance on GO within flow */
function flowGo() {
  const c = curCh();
  const sec = c.sections[S.cur.sec];
  if (S.cur.ph === "sec") { S.cur.ph = "bare"; S.cur.pt = Math.min(S.cur.pt, sec.points.length-1); save(); renderFlow(); sndCard(); return; }
  const p = sec.points[S.cur.pt];
  if (S.cur.ph === "bare" && (p.detail || "").trim()) {
    S.cur.ph = "detail"; save(); renderFlow(); sndNext(); return;
  }
  // detail shown (or point has no detail yet) → complete + advance
  completePoint(p);
  if (S.cur.pt + 1 < sec.points.length) { S.cur.pt++; S.cur.ph = "bare"; }
  else if (S.cur.sec + 1 < c.sections.length) { S.cur.sec++; S.cur.pt = 0; S.cur.ph = "sec"; }
  else { S.cur.ph = "done"; }
  save();
  pumpQueue();
}
/* show next queue item, or resume flow */
function pumpQueue() {
  if (QUEUE.length) {
    const it = QUEUE.shift();
    if (it.t === "qbare") { VIEW = {scr:"q", q: it.q, ph:"bare", ret:"flow"}; renderQ(); return; }
  }
  if (S.cur && S.cur.ph === "done") { VIEW = {scr:"chdone"}; renderChDone(); return; }
  VIEW = {scr:"flow"}; renderFlow();
  if (S.cur.ph === "bare") sndCard(); else sndNext();
}
function renderChDone() {
  goBtn(true);
  const c = curCh();
  $app.innerHTML = topBar("", "chapters") +
    `<div class="stage"><div class="sec-big">第${c.no}章 完</div>

}

/* ---------- question ---------- */
function renderQ() {
  const q = QS[VIEW.q];
  goBtn(true); setWide(false);
  const starred = S.starred.includes(q.id);
  const big = q.type === "big";
  let h = topBar("", VIEW.ret === "flow" ? "chapters" : VIEW.ret) +
    `<div class="qwrap"><span class="star ${starred?"on":""}" data-act="star">${starred ? "★" : "☆"}</span>

     <div class="qstem">${esc(q.stem)}</div>`;
  if (q.fig) h += `<div class="qfig">${esc(q.fig)}</div>`;
  if (big) {
    for (const p of q.parts) {
      const head = [p.label, p.q].filter(Boolean).join(" ");
      if (!head && VIEW.ph !== "ans") continue;
      h += `<div class="qpart">${esc(head)}` +
        (VIEW.ph === "ans" ? `<div class="qpans">${esc(p.ans)}</div>` : "") + `</div>`;
    }

        `<div class="small dim" style="margin-top:14px">命中：${q.kps.map(k => KP[k] ? KP[k].title : k).join(" / ")}</div></div>`;
    }
  } else {
    h += `<div class="qopts">`;
    for (const k of ["A","B","C","D"]) {
      const hit = VIEW.ph === "ans" && q.answer === k;
      const sel = VIEW.ph === "ans" && VIEW.sel === k && k !== q.answer;
      h += `<div class="qopt${hit ? " hit" : ""}${sel ? " sel" : ""}"${VIEW.ph === "bare" ? ` data-opt="${k}"` : ""}>${k}. ${esc(q.options[k])}${sel ? "　✗" : ""}</div>`;
    }
    h += `</div>`;
    if (VIEW.ph === "ans") {
      h += `<div class="qans"><div>答案：${q.answer}</div>
            <div class="qana">${esc(q.analysis)}</div>
            <div class="small dim" style="margin-top:14px">命中：${q.kps.map(k => KP[k] ? KP[k].title : k).join(" / ")}</div></div>`;
    }
  }
  h += `</div>`;
  $app.innerHTML = h;
}
function reveal() {
  const q = QS[VIEW.q];
  if (VIEW.sel) {
    logEv("ans", {q: q.id, sel: VIEW.sel, ok: VIEW.sel === q.answer});
    if (VIEW.sel !== q.answer) {
      if (!S.wrongs.includes(q.id)) S.wrongs.push(q.id);          // ✗ 历史标记
      if (!S.starred.includes(q.id)) S.starred.push(q.id);        // 答错自动加星；觉得没价值就手动摘星
    }
    save();
  } else {
    if (!S.seen[q.id]) logEv("peek", {q: q.id});                  // 仅"第一次遇到就看答案"才记；做过的题为够到后面的题而 GO 推过去=纯导航，无意义，不记
  }
  VIEW.ph = "ans"; renderQ();
}
function qGo() {
  const q = QS[VIEW.q];
  if (VIEW.ph === "bare") { reveal(); return; }
  if (VIEW.ret !== "bank") {
    // 首次遇到才记解锁日期并计入热力图"题"；复习重看不刷新日期、不重计（与"今日解锁真题"同源）
    if (!S.seen[q.id]) { S.seen[q.id] = today(); heatAdd("q"); }
    S.pendingQ = S.pendingQ.filter(x => x !== q.id);
    save();
  }
  if (VIEW.ret === "flow") { pumpQueue(); }
  else if (VIEW.ret === "doubts") { VIEW = {scr:"doubts"}; renderDoubts(); }
  else if (VIEW.ret === "dex") { VIEW = {scr:"dex"}; renderDex(); }
  else if (VIEW.ret === "bank") { VIEW = {scr:"bank"}; renderBank(); }
  else { VIEW = {scr:"home"}; renderHome(); }
}

/* 与 408 完全隔离：独立数据源 window.EXAM_DATA / EXAM_DICT，独立视图 scr="exam"/"exampart"，
   独立存档切片 S.exam；题型×年份矩阵，年份列数据驱动（新增 eng_YYYY_*.json → 重跑 build_exam_data.py 即扩容）。*/
const EXAM = window.EXAM_DATA || {};
const EXDICT = window.EXAM_DICT || {};
const EXAM_ROWS = [
  {id:"cloze",  name:"完形填空",    rng:"1–20",   kind:"cloze"},
  {id:"r1",     name:"阅读 Text 1", rng:"21–25",  kind:"reading", idx:0},
  {id:"r2",     name:"阅读 Text 2", rng:"26–30",  kind:"reading", idx:1},
  {id:"r3",     name:"阅读 Text 3", rng:"31–35",  kind:"reading", idx:2},

  {id:"wa",     name:"小作文",      rng:"Part A", kind:"wa"},
  {id:"wb",     name:"大作文",      rng:"Part B", kind:"wb"},
];
const EXAM_NOS = {cloze:[1,20], r1:[21,25], r2:[26,30], r3:[31,35], r4:[36,40], partb:[41,45]};
let EXPICK = {}, EXREV = false;                     // 当前 section 临时作答与是否已对答案（不入存档，离场即弃）
let EX_SEC = 0;                                     // 做题视图即时计时（秒）：每格独立、离场归零、纯会话不入 localStorage（与全局科目/章计时互不干扰）
function exClockFmt(s) { const m = Math.floor(s / 60); return m + ":" + String(s % 60).padStart(2, "0"); }
setInterval(() => {                                 // 独立一枚：只服务当前这格，离开做题视图即归零，页面不可见则暂停（不后台空跑）
  if (VIEW.scr !== "exampart") { EX_SEC = 0; return; }
  if (document.visibilityState !== "visible") return;
  EX_SEC++;
  const el = document.getElementById("extimer");
  if (el) el.textContent = exClockFmt(EX_SEC);
}, 1000);
function examYears() { return Object.keys(EXAM).sort((a, b) => b - a); }   // 新年份在前，扩容自然
function examRow(id) { return EXAM_ROWS.find(r => r.id === id); }
function exKey(y, row) { return y + "|" + row; }
function examProgress() {
  const ys = examYears(), tot = ys.length * EXAM_ROWS.length;
  let done = 0;
  for (const y of ys) for (const r of EXAM_ROWS) {
    const st = S.exam[exKey(y, r.id)];
    if (st && (typeof st.n === "number" || st.seen)) done++;
  }
  return {done, tot, pct: tot ? Math.round(done / tot * 100) : 0};
}

/* ---------- 矩阵（题型 × 年份） ---------- */

  h += `<div class="exam-grid" style="grid-template-columns:minmax(6rem,auto) repeat(${years.length},minmax(2.6rem,1fr))">`;

function examCell(y, r) {
  const key = exKey(y, r.id), st = S.exam[key], scored = EXAM_NOS[r.id];
  let cls = "exam-cell", inner = `<span class="exam-dot">·</span>`;
  if (scored && st && typeof st.n === "number") {
    const ratio = st.d ? st.n / st.d : 0;
    cls += " done " + (ratio >= .8 ? "hi" : ratio >= .5 ? "mid" : "lo");
    inner = `<span class="exam-sc">${st.n}<i>/${st.d}</i></span>`;
  } else if (!scored && st && st.seen) {

/* ---------- 做题 ---------- */
function enterExam(y, row) {
  const r = examRow(row);
  if (!EXAM[y] || !r) return;
  VIEW = {scr: "exampart", year: y, row: row};
  EXPICK = {}; EXREV = false; EX_SEC = 0;               // 进这格：计时从 0 起跳
  if (r.id === "wa" || r.id === "wb") {                 // 写作纯练笔：进入即算「已阅」
    const k = exKey(y, r.id);
    if (!(S.exam[k] && S.exam[k].seen)) { S.exam[k] = {seen: 1}; save(); }
  }
  renderExamPart();
}
function renderExamPart() {
  goBtn(false); setWide(false);
  const y = VIEW.year, r = examRow(VIEW.row), d = EXAM[y];
  if (!d || !r) { VIEW = {scr: "exam"}; renderExam(); return; }
  let h = topBar(y + " · " + r.name, "exam") + `<span id="extimer">${exClockFmt(EX_SEC)}</span><div class="ex-wrap">`;
  if (r.kind === "cloze") h += exCloze(d, exKey(y, r.id));
  else if (r.kind === "reading") h += exReading(d, r, exKey(y, r.id));
  else if (r.kind === "partb") h += exPartb(d, exKey(y, r.id));
  else if (r.kind === "transc") h += exTransc(d);
  else h += exWriting(d, r);
  h += `</div>`;
  $app.innerHTML = h;
}
function exBlankText(t) {    // 完形：__n__ → 编号空
  return esc(t).replace(/__(\d+)__/g, `<span class="ex-blank">$1</span>`);
}
function exUnderline(t) {    // 翻译：<uN>…</uN> → 下划句（esc 后标记形如 &lt;uN&gt;）
  return esc(t).replace(/&lt;u(\d+)&gt;/g, `<span class="ex-u">`).replace(/&lt;\/u\d+&gt;/g, `</span>`);
}
function exOpt(no, k, text, correct, inline) {
  const sel = EXPICK[no] === k, hit = EXREV && correct === k, bad = EXREV && sel && k !== correct;
  const cls = "ex-opt" + (inline ? " inl" : "") + (sel ? " sel" : "") + (hit ? " hit" : "") + (bad ? " bad" : "");
  return `<span class="${cls}"${EXREV ? "" : ` data-exopt="${no}|${k}"`}><b>${k}</b>${text != null ? " " + esc(text) : ""}${bad ? " ✗" : ""}</span>`;
}
function exCloze(d, key) {
  const c = d.cloze, ans = d.answers;
  let h = `<div class="ex-dir">${esc(c.directions)}</div><div class="ex-passage">${exBlankText(c.text)}</div><div class="ex-items">`;
  for (let n = 1; n <= 20; n++) {
    const o = c.options[String(n)] || {};
    h += `<div class="ex-item"><span class="ex-no">${n}</span><div class="ex-opts inl">` +
      ["A","B","C","D"].map(k => exOpt(n, k, o[k], ans[String(n)], true)).join("") + `</div></div>`;
  }
  return h + `</div>` + exScore(key);
}
function exReading(d, r, key) {
  const t = d.reading[r.idx], ans = d.answers;
  let h = `<div class="ex-dir">${esc(d.reading_directions)}</div><div class="ex-ph">Text ${t.text_no}</div>` +
    `<div class="ex-passage">${esc(t.passage)}</div><div class="ex-items">`;
  for (const q of t.questions) {
    h += `<div class="ex-item col"><div class="ex-stem"><span class="ex-no">${q.no}</span>${esc(q.stem)}</div><div class="ex-opts">` +
      ["A","B","C","D"].map(k => exOpt(q.no, k, q.options[k], ans[String(q.no)], false)).join("") + `</div></div>`;
  }
  return h + `</div>` + exScore(key);
}
function exPartb(d, key) {
  const pb = d.part_b, ans = d.answers, named = pb._kind === "named_items";
  const letters = Object.keys(pb.paragraphs).sort();
  let h = `<div class="ex-dir">${esc(pb.directions)}</div>`;
  if (pb.layout_note) h += `<div class="ex-note">${esc(pb.layout_note)}</div>`;
  h += `<div class="ex-pool">`;
  for (const L of letters) h += `<div class="ex-para"><span class="ex-pl">${L}</span><span>${esc(pb.paragraphs[L])}</span></div>`;
  h += `</div><div class="ex-items">`;
  for (let no = 41; no <= 45; no++) {
    let prompt;
    if (named) {
      const it = (pb.items || []).find(x => x.no === no) || {};
      prompt = `<span class="ex-nm">${esc(it.name || "")}</span> ${esc(it.text || "")}`;
    } else prompt = `<span class="ex-slot">选段 ${no}</span>`;
    h += `<div class="ex-item col"><div class="ex-stem"><span class="ex-no">${no}</span>${prompt}</div><div class="ex-opts inl lett">` +
      letters.map(L => exOpt(no, L, null, ans[String(no)], true)).join("") + `</div></div>`;
  }
  return h + `</div>` + exScore(key);
}
function exTransc(d) {
  const pc = d.part_c, tr = d.translations;
  let h = `<div class="ex-dir">${esc(pc.directions)}</div><div class="ex-passage">${exUnderline(pc.text)}</div><div class="ex-items">`;
  for (let no = 46; no <= 50; no++) {
    h += `<div class="ex-tr"><div class="ex-stem"><span class="ex-no">${no}</span>${esc(pc.sentences[String(no)] || "")}</div>` +
      `<textarea class="ex-ta" spellcheck="false" placeholder="在此自译…"></textarea>` +
      `<div class="ex-ref hidden" data-ref="${no}">${esc(tr[String(no)] || "")}</div>` +
      `<span class="ex-btn ghost" data-exact="ref|${no}">参考译文</span></div>`;
  }
  return h + `</div>`;
}
function exWriting(d, r) {
  const w = r.id === "wa" ? (d.writing.part_a || {}) : (d.writing.part_b || {});
  let h = `<div class="ex-dir">${esc(w.directions || "")}</div>`;
  if (r.id === "wa" && w.email) h += `<div class="ex-passage">${esc(w.email)}</div>`;
  if (r.id === "wb" && w.figure) h += `<div class="ex-fig">${esc(w.figure)}</div>`;
  return h + `<textarea class="ex-ta big" spellcheck="false" placeholder="在此练笔…（不判分，仅供练习，离开不保存）"></textarea>`;
}
function exScore(key) {
  const rng = EXAM_NOS[examRow(VIEW.row).id];
  if (!rng) return "";
  const tot = rng[1] - rng[0] + 1;
  if (EXREV) {
    const st = S.exam[key] || {n: 0, d: tot};
    const d = EXAM[VIEW.year], exp = d && d.explain && d.explain[VIEW.row];   // 预留：未来 EXAM[year].explain[rowId] 若有解析则显影；现无此字段＝不渲染（reveal 区可无痛扩容）
    return `<div class="ex-result">对答案：<b>${st.n}</b> / ${tot}　<span class="ex-btn" data-exact="redo">重做</span></div>` +
      (exp ? `<div class="ex-explain">${esc(exp)}</div>` : ``);
  }
  let picked = 0;
  for (let n = rng[0]; n <= rng[1]; n++) if (EXPICK[n]) picked++;
  return `<div class="ex-actions"><span class="ex-btn go${picked ? "" : " off"}" data-exact="submit">对答案</span><span class="ex-picked">已选 ${picked} / ${tot}</span></div>`;
}
function examSubmit() {
  const r = examRow(VIEW.row), rng = EXAM_NOS[r.id];
  if (!rng) return;
  const ans = EXAM[VIEW.year].answers;
  let n = 0, tot = rng[1] - rng[0] + 1;
  for (let no = rng[0]; no <= rng[1]; no++) if (EXPICK[no] === ans[String(no)]) n++;
  S.exam[exKey(VIEW.year, r.id)] = {n, d: tot};
  EXREV = true; save(); renderExamPart();
}
function examRevealRef(no) {                          // 翻译：亮某句参考译文（就地 DOM 改，保住练笔框内容不被重渲染冲掉）
  const ref = $app.querySelector(`.ex-ref[data-ref="${no}"]`);
  if (ref) ref.classList.remove("hidden");
  const btn = $app.querySelector(`.ex-btn[data-exact="ref|${no}"]`);
  if (btn) btn.style.display = "none";
  const k = exKey(VIEW.year, "transc");
  if (!(S.exam[k] && S.exam[k].seen)) { S.exam[k] = {seen: 1}; save(); }
}

/* ============================== selftest ============================== */
function selftest() {
  const out = [];
  const ok = (name, cond) => out.push((cond ? "PASS " : "FAIL ") + name);
  // 1. data integrity
  ok("kp ids unique", Object.keys(KP).length === TOTAL_KP);
  ok("q ids unique", new Set(DATA.questions.map(q=>q.id)).size === DATA.questions.length);
  ok("q.kps all exist", DATA.questions.every(q => q.kps.every(k => KP[k])));
  const mcq = DATA.questions.filter(q => q.type !== "big"), bigq = DATA.questions.filter(q => q.type === "big");
  ok("mc options complete", mcq.every(q => ["A","B","C","D"].every(k => q.options[k])));
  ok("mc answers valid", mcq.every(q => "ABCD".includes(q.answer)));
  ok("big parts valid", bigq.every(q => Array.isArray(q.parts) && q.parts.length > 0 && q.parts.every(p => String(p.ans || "").trim())));
  ok("details ≤ 310 chars", Object.values(KP).every(p => (p.detail||"").length <= 310));
  // 2. surfacing simulation on scratch state
  const realS = S;
  S = freshState();
  const _surf = sndSurface; sndSurface = function(){};   // mute during sim (headless perf / log spam)
  SIM = true;
  let surfaced = 0;
  const allKps = [];
  for (const s of DATA.levels.subjects) for (const c of s.chapters)
    for (const sec of (c.sections||[])) for (const p of sec.points) allKps.push(p);
  for (const p of allKps) {                              // 正向单遍走完整大纲：每题应在其门槛点恰好浮现一次
    completePoint(p);
    surfaced += QUEUE.filter(x => x.t === "qbare").length;
    QUEUE.length = 0; S.pendingQ = [];
  }
  SIM = false;
  sndSurface = _surf;
  const validQ = DATA.questions.filter(q => q.kps.length && q.kps.every(k => KP[k]));
  ok("每题门槛点 ∈ 其考点", validQ.every(q => q.kps.includes(GATE[q.id])));
  ok("门槛点全出·正向单遍每题恰好浮现一次 (" + surfaced + "/" + validQ.length + ")", surfaced === validQ.length);
  // 3. quotes
  ok("quotes valid (≥30, fields ok)", (DATA.quotes || []).length >= 30 &&
     (DATA.quotes || []).every(q => q.text && q.src && ["ds","co","os","net"].includes(q.subject) && q.ch >= 1));
  S = realS;
  QUEUE.length = 0;
  // 英语一自检（象胥）——独立计数 enOut，绝不并入上方 408 的 10/10（752/752 断言分毫不动）；数据缺席则整段跳过
  const enOut = [];
  const enok = (name, cond) => enOut.push((cond ? "PASS " : "FAIL ") + name);
  if (Object.keys(EXAM).length) {
    const EXY = Object.keys(EXAM);
    enok("exam years present", EXY.length >= 1);
    enok("exam sections complete", EXY.every(y => {
      const d = EXAM[y];
      return d && d.cloze && Object.keys(d.cloze.options).length === 20 &&
        Array.isArray(d.reading) && d.reading.length === 4 && d.reading.every(t => t.questions.length === 5) &&
        d.part_b && (d.part_b._kind === "named_items" || d.part_b._kind === "paragraph_pool") &&
        d.part_c && Object.keys(d.part_c.sentences).length === 5;
    }));
    enok("exam answers 1-45 & translations 46-50", EXY.every(y => {
      const a = EXAM[y].answers, t = EXAM[y].translations;
      for (let i = 1; i <= 45; i++) if (!a[String(i)]) return false;
      for (let i = 46; i <= 50; i++) if (!t[String(i)]) return false;
      return true;
    }));
    enok("exam dict is map", EXDICT && typeof EXDICT === "object" && !Array.isArray(EXDICT));
    enok("exam all sections render", (function () {   // 内存渲染冒烟：全年×全题型走一遍，含判分/亮答案路径，永不落屏（版权正文不显示）
      const sv = VIEW, sp = EXPICK, sr = EXREV; let good = true;
      try {
        for (const y of EXY) for (const r of EXAM_ROWS) {
          VIEW = {scr: "exampart", year: y, row: r.id}; EXPICK = {}; EXREV = false;
          const d = EXAM[y], key = exKey(y, r.id);
          const html = r.kind === "cloze" ? exCloze(d, key) : r.kind === "reading" ? exReading(d, r, key)
            : r.kind === "partb" ? exPartb(d, key) : r.kind === "transc" ? exTransc(d) : exWriting(d, r);
          if (!html || html.length < 20) good = false;
          if (EXAM_NOS[r.id]) { EXREV = true; if (!exScore(key)) good = false; }
        }
      } catch (e) { good = false; }
      VIEW = sv; EXPICK = sp; EXREV = sr; return good;

  }

/* ---------------- 配置 ---------------- */
var cfg=null;
function loadCfg(){try{cfg=JSON.parse(localStorage.getItem(CFG_KEY)||"null");}catch(e){cfg=null;}
  if(!cfg||typeof cfg!=="object")cfg=null; return cfg;}
function saveCfg(c){cfg=c;try{localStorage.setItem(CFG_KEY,JSON.stringify(c));}catch(e){}}

/* ---------------- GitHub Contents 传输 ---------------- */
function gh(method,path,body){
  var h={"Authorization":"Bearer "+cfg.tok,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};
  var o={method:method,headers:h};
  if(body){h["Content-Type"]="application/json";o.body=JSON.stringify(body);}
  try{if(window.AbortSignal&&AbortSignal.timeout)o.signal=AbortSignal.timeout(20000);}catch(e){}
  return fetch(API+path,o).then(function(r){
    if(r.status===404)return {s:404,j:null};
    return r.json().catch(function(){return null;}).then(function(j){return {s:r.status,j:j};});
  });
}
function fpath(key){return "/repos/"+cfg.repo+"/contents/s/"+encodeURIComponent(key)+".json";}
function pull(key){
  return gh("GET",fpath(key)+"?ref="+(cfg.branch||"main")).then(function(r){
    if(r.s===404)return {sha:null,env:null};
    if(r.s!==200||!r.j||r.j.content==null)throw new Error("拉取失败 HTTP "+r.s);
    var env=null;try{env=JSON.parse(b64d(r.j.content));}catch(e){}
    return {sha:r.j.sha,env:env};
  });
}
function push(key,env,sha){
  var body={message:"sync "+key+" @"+(cfg.dev||"dev"),content:b64e(JSON.stringify(env)),branch:cfg.branch||"main"};
  if(sha)body.sha=sha;
  return gh("PUT",fpath(key),body).then(function(r){
    if(r.s===200||r.s===201)return true;
    if(r.s===409||r.s===422)return "conflict";
    throw new Error("上推失败 HTTP "+r.s);
  });
}

/* ---------------- 同步引擎 ---------------- */
var A=null, busy=false, lastOkT=0, lastMsg="未配置", savedT=0, pollT=0;
function setMsg(m){lastMsg=m;renderStatus();}
function hhmm(t){var d=new Date(t);return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function shadowGet(key){try{return JSON.parse(localStorage.getItem(SHADOW_PRE+key)||"null");}catch(e){return null;}}
function shadowSet(key,v){try{localStorage.setItem(SHADOW_PRE+key,JSON.stringify(v));}catch(e){}}

function syncStore(st,force){ /* force="pushAll"|"pullAll"|null */
  var lib=STORES[st.key]; if(!lib)return Promise.resolve({key:st.key,what:"unknown"});
  return pull(st.key).then(function(p){
    var remote=(p.env&&p.env.data!==undefined)?p.env.data:null;
    var local=st.get();
    var merged, what="same";
    if(force==="pushAll")merged=local;
    else if(force==="pullAll")merged=(remote!=null)?remote:local;
    else if(local==null&&remote==null)return {key:st.key,what:"empty"};
    else if(local==null)merged=remote;
    else if(remote==null)merged=local;
    else merged=lib.merge(local,remote,{base:shadowGet(st.key)});
    if(merged==null)return {key:st.key,what:"empty"};
    var sigM=lib.sig(merged);
    if(local==null||sigM!==lib.sig(local)){st.set(clone(merged));what="pulled";}
    var needPush = (remote==null) ? !(lib.virgin(merged)&&!force)
                                  : sigM!==lib.sig(remote);
    if(force==="pullAll")needPush=false;
    if(needPush){
      var env={v:1,t:Date.now(),dev:cfg.dev||"dev",data:merged};
      var attempt=function(n,sha){
        return push(st.key,env,sha).then(function(ok){
          if(ok===true)return;
          if(n>=2)throw new Error("上推冲突未决");
          return pull(st.key).then(function(p2){
            var r2=(p2.env&&p2.env.data!==undefined)?p2.env.data:null;
            if(r2!=null)env.data=lib.merge(env.data,r2,{base:shadowGet(st.key)});
            return attempt(n+1,p2.sha);
          });
        });
      };
      return attempt(0,p.sha).then(function(){
        if(lib.shadowPick)shadowSet(st.key,lib.shadowPick(env.data));
        return {key:st.key,what:what==="pulled"?"pulled":"pushed"};
      });
    }
    if(lib.shadowPick)shadowSet(st.key,lib.shadowPick(merged));
    return {key:st.key,what:what};
  });
}

function syncNow(manual,force){
  if(!A)return Promise.resolve();
  if(A.blocked&&A.blocked()){if(manual)setMsg("本页免写模式，不同步");return Promise.resolve();}
  loadCfg();
  if(!enabled()){if(manual)setMsg("未配置 token");renderStatus();return Promise.resolve();}
  if(busy){if(manual)setMsg("同步中…");return Promise.resolve();}
  busy=true;setMsg("同步中…");
  var changed=[],pushed=0;
  var chain=Promise.resolve();
  A.stores.forEach(function(st){
    chain=chain.then(function(){return syncStore(st,force);}).then(function(r){
      if(r&&r.what==="pulled")changed.push(r.key);
      if(r&&r.what==="pushed")pushed++;
    });
  });
  return chain.then(function(){
    busy=false;lastOkT=Date.now();
    setMsg("✓ "+hhmm(lastOkT)+(changed.length?" 收"+changed.length:"")+(pushed?" 发"+pushed:""));
    if(changed.length&&A.applied){try{A.applied(changed);}catch(e){}}
  }).catch(function(e){
    busy=false;setMsg("✗ "+String(e&&e.message||"网络不通").slice(0,42));
  });
}

/* 壳 save() 后的防抖上推 */
function saved(){
  if(!A||!enabled()||(A.blocked&&A.blocked()))return;
  clearTimeout(savedT);
  savedT=setTimeout(function(){syncNow(false);},10000);
}

/* ---------------- 触屏与窄屏件（PROGRESS AI ⑤） ---------------- */
function mobilePatch(opt){
  opt=opt||{};
  try{ /* 窄屏视口钉 500：ip13pm 视口 428 < 布局下限 480-500，整体等比缩放 */
    var w=Math.min(screen.width||9999,screen.height||9999);
    if(!opt.noClamp&&w&&w<500){
      var m=document.querySelector("meta[name=viewport]");
      if(!m){m=document.createElement("meta");m.setAttribute("name","viewport");document.head.appendChild(m);}
      m.setAttribute("content","width=500, viewport-fit=cover");
    }
  }catch(e){}
  if(!("ontouchstart" in window))return;
  var st=document.createElement("style");
  st.textContent="body{touch-action:manipulation;}"
    +(opt.calloutSel?opt.calloutSel+"{-webkit-touch-callout:none;}":"")                    /* 只禁系统长按菜单（保留选区能力） */
    +(opt.noSelectSel?opt.noSelectSel+"{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}":"");
  document.head.appendChild(st);
  /* 双 tap → 合成 dblclick（iOS Safari 触屏不产原生 dblclick；≤330ms/≤30px） */
  var lt=0,lx=0,ly=0;
  document.addEventListener("touchend",function(e){
    if(e.touches&&e.touches.length)return;
    var t=e.changedTouches&&e.changedTouches[0];if(!t)return;
    if(e.target&&e.target.closest&&e.target.closest("input,textarea,select,#kysync-panel"))return;
    var n=Date.now();
    var db=(n-lt)<330&&Math.hypot(t.clientX-lx,t.clientY-ly)<30;
    lt=db?0:n;lx=t.clientX;ly=t.clientY;
    if(!db)return;
    if(opt.wordSelect)selectWordAt(t.clientX,t.clientY);
    var tgt=document.elementFromPoint(t.clientX,t.clientY)||document.body;
    var ev;
    try{ev=new MouseEvent("dblclick",{bubbles:true,cancelable:true,view:window,clientX:t.clientX,clientY:t.clientY});}
    catch(err){ev=document.createEvent("MouseEvents");ev.initMouseEvent("dblclick",true,true,window,2,0,0,t.clientX,t.clientY,false,false,false,false,0,null);}
    tgt.dispatchEvent(ev);
  },{passive:true});
  function selectWordAt(x,y){ /* 给「读选区」型双击处理器铺路：程序化选中所点单词 */
    try{
      var r=document.caretRangeFromPoint?document.caretRangeFromPoint(x,y):null;
      if(!r||r.startContainer.nodeType!==3)return;
      var node=r.startContainer,s=node.textContent,a=r.startOffset,b=a;
      while(a>0&&/[A-Za-z'\-]/.test(s.charAt(a-1)))a--;
      while(b<s.length&&/[A-Za-z'\-]/.test(s.charAt(b)))b++;
      if(b<=a)return;
      var rng=document.createRange();rng.setStart(node,a);rng.setEnd(node,b);
      var sel=window.getSelection();sel.removeAllRanges();sel.addRange(rng);
    }catch(e){}
  }
}
